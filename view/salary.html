<!DOCTYPE html>
<!-- view/salary.html — trang lương thưởng -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lương thưởng — EmpManager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="page-wrap">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Lương thưởng 💰</h1>
      <p>Xem và quản lý bảng lương hàng tháng</p>
    </div>

    <!-- FORM TẠO BẢNG LƯƠNG (chỉ admin) -->
    <div class="card" id="create-card" style="display:none;">
      <div class="card-header">
        <h2>Tạo bảng lương</h2>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nhân viên</label>
          <select id="sal-emp-id">
            <option value="">Chọn nhân viên...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tháng</label>
          <input type="month" id="sal-month" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Thưởng (₫)</label>
          <input type="number" id="sal-bonus" value="0" min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label>Khấu trừ (₫)</label>
          <input type="number" id="sal-deduction" value="0" min="0" placeholder="0" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="createSalary()">
        💾 Tạo bảng lương
      </button>
    </div>

    <!-- BẢNG LƯƠNG -->
    <div class="card">
      <div class="card-header">
        <h2>Bảng lương</h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <input type="month" id="filter-month"
            style="padding:6px 10px;border:1.5px solid #e4e7ec;border-radius:8px;font-family:inherit;" />
          <button class="btn btn-ghost btn-sm" onclick="loadSalaries()">Lọc</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th id="col-emp" style="display:none;">Nhân viên ID</th>
              <th>Tháng</th>
              <th>Lương cơ bản</th>
              <th>Thưởng</th>
              <th>Khấu trừ</th>
              <th>Thực nhận</th>
              <th id="col-action" style="display:none;">Thao tác</th>
            </tr>
          </thead>
          <tbody id="sal-body">
            <tr><td colspan="8" class="empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL SỬA LƯƠNG (chỉ admin) -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Sửa bảng lương</h2>
      <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-sal-id" />
    <div class="form-group">
      <label>Thưởng (₫)</label>
      <input type="number" id="edit-bonus" min="0" />
    </div>
    <div class="form-group">
      <label>Khấu trừ (₫)</label>
      <input type="number" id="edit-deduction" min="0" />
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModal('edit-modal')">Hủy</button>
      <button class="btn btn-primary" onclick="saveEdit()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="main.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await requireLogin();
    if (!currentUser) return;

    renderSidebar("salary", currentUser);

    // đặt tháng mặc định = tháng này
    const thisMonth = new Date().toISOString().slice(0, 7);
    document.getElementById("filter-month").value = thisMonth;

    if (currentUser.role === "admin") {
      document.getElementById("create-card").style.display  = "block";
      document.getElementById("col-emp").style.display      = "";
      document.getElementById("col-action").style.display   = "";
      document.getElementById("sal-month").value            = thisMonth;
      await loadEmployeeOptions();
    }

    await loadSalaries();
  }

  async function loadEmployeeOptions() {
    const res = await API.get("/auth/employees");
    if (!res.success) return;
    const sel = document.getElementById("sal-emp-id");
    sel.innerHTML = res.data.map(e =>
      `<option value="${e.id}">${e.name} — Lương CB: ${formatMoney(e.base_salary)}</option>`
    ).join("");
  }

  async function createSalary() {
    const employee_id = parseInt(document.getElementById("sal-emp-id").value);
    const month       = document.getElementById("sal-month").value;
    const bonus       = parseFloat(document.getElementById("sal-bonus").value) || 0;
    const deduction   = parseFloat(document.getElementById("sal-deduction").value) || 0;

    const res = await API.post("/salary", { employee_id, month, bonus, deduction });
    showToast(res.message, res.success ? "success" : "error");
    if (res.success) await loadSalaries();
  }

  async function loadSalaries() {
    const month   = document.getElementById("filter-month").value;
    const res     = await API.get(`/salary?month=${month}`);
    const tbody   = document.getElementById("sal-body");
    const isAdmin = currentUser.role === "admin";
    const cols    = isAdmin ? 8 : 6;

    if (!res.success || res.data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${cols}" class="empty">Chưa có bảng lương tháng này</td></tr>`;
      return;
    }

    tbody.innerHTML = res.data.map(s => `
      <tr>
        <td style="color:#9ca3af">#${s.id}</td>
        ${isAdmin ? `<td>ID ${s.employee_id}</td>` : ""}
        <td>${s.month}</td>
        <td>${formatMoney(s.base)}</td>
        <td style="color:#16a34a">+${formatMoney(s.bonus)}</td>
        <td style="color:#dc2626">-${formatMoney(s.deduction)}</td>
        <td style="font-weight:700;">${formatMoney(s.total)}</td>
        ${isAdmin ? `<td><button class="btn btn-ghost btn-sm" onclick="openEdit(${s.id},${s.bonus},${s.deduction})">Sửa</button></td>` : ""}
      </tr>
    `).join("");
  }

  function openEdit(id, bonus, deduction) {
    document.getElementById("edit-sal-id").value    = id;
    document.getElementById("edit-bonus").value     = bonus;
    document.getElementById("edit-deduction").value = deduction;
    openModal("edit-modal");
  }

  async function saveEdit() {
    const id        = document.getElementById("edit-sal-id").value;
    const bonus     = parseFloat(document.getElementById("edit-bonus").value) || 0;
    const deduction = parseFloat(document.getElementById("edit-deduction").value) || 0;

    const res = await API.put(`/salary/${id}`, { bonus, deduction });
    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      closeModal("edit-modal");
      await loadSalaries();
    }
  }

  init();
</script>
</body>
</html>
