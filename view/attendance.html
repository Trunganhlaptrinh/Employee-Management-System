<!DOCTYPE html>
<!-- view/attendance.html — trang điểm danh -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Điểm danh — EmpManager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="image/logo_E.png" />
  <style>
    /* ===== ATTENDANCE CLOCK ===== */
    .attendance-clock {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .clock-display {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .clock-icon {
      font-size: 2rem;
      line-height: 1;
    }
    .clock-time {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .clock-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .btn-checkin {
      padding: 10px 28px;
      font-size: 0.95rem;
      border-radius: 10px;
      background: #4255ff;
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .btn-checkin:hover:not(:disabled) { 
      background: #3345e8;
    }
    .btn-checkin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-checkin.checked-in {
      background: #4255ff;
      opacity: 0.6;
    }
    .btn-checkin.late {
      background: #4255ff;
      opacity: 0.6;
    }

    /* ===== CALENDAR HEATMAP ===== */
    .calendar-heatmap {
      margin-top: 4px;
    }
    .heatmap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .heatmap-title {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .heatmap-nav {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .heatmap-nav button {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .78rem;
      transition: background .15s;
    }
    .heatmap-nav button:hover { background: var(--bg); }
    .heatmap-nav .month-label {
      font-weight: 600;
      min-width: 90px;
      text-align: center;
      font-size: 0.85rem;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      max-width: 520px;
    }
    .heatmap-weekday {
      font-size: .6rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      padding: 3px 0;
      text-transform: uppercase;
    }
    .heatmap-day {
      aspect-ratio: 1;
      border-radius: 3px;
      background: #e8e8e8;
      cursor: default;
      transition: background .15s;
      position: relative;
      min-width: 24px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text);
    }
    .heatmap-day.has-data {
      cursor: pointer;
    }
    .heatmap-day.has-data:hover {
      transform: scale(1.1);
      z-index: 2;
    }
    .heatmap-day.present {
      background: #40c463;
      color: #fff;
    }
    .heatmap-day.late {
      background: #f9c74f;
      color: #fff;
    }
    .heatmap-day.absent {
      background: #d1d5db;
      color: #6b7280;
    }
    .heatmap-day.today {
      outline: 2px solid #4255ff;
      outline-offset: 1px;
      font-weight: 700;
    }
    .heatmap-day.empty {
      background: transparent;
      color: transparent;
    }
    .heatmap-day.sunday {
      background: #f3f4f6;
      color: #9ca3af;
      font-size: 0.5rem;
      font-weight: 600;
    }
    .heatmap-day.sunday.has-data {
      background: #f3f4f6 !important;
      color: #9ca3af !important;
    }

    .heatmap-day .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: .65rem;
      white-space: nowrap;
      z-index: 10;
      font-weight: 500;
    }
    .heatmap-day .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--text);
    }
    .heatmap-day.has-data:hover .tooltip {
      display: block;
    }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: .7rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .heatmap-legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .heatmap-legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }
    .heatmap-legend-dot.present { background: #40c463; }
    .heatmap-legend-dot.late { background: #f9c74f; }
    .heatmap-legend-dot.absent { background: #d1d5db; border: 1px solid #b0b4b8; }
    .heatmap-legend-dot.sunday-dot { background: #f3f4f6; border: 1px solid #d0d4d8; }

    @media (max-width: 600px) {
      .attendance-clock {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .clock-display {
        justify-content: center;
      }
      .clock-time {
        font-size: 1.4rem;
      }
      .btn-checkin {
        width: 100%;
        text-align: center;
        padding: 10px 20px;
        font-size: 0.9rem;
      }
      .heatmap-grid {
        gap: 2px;
        max-width: 100%;
      }
      .heatmap-day {
        min-width: 20px;
        min-height: 20px;
        font-size: 0.55rem;
      }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1 style="font-size: 1.3rem;">Điểm danh</h1>
      <p style="font-size: 0.85rem; color: var(--muted);">Xem và quản lý bảng chấm công</p>
    </div>

    <div class="card" style="padding: 16px 20px;">
      <div class="attendance-clock">
        <div class="clock-display">
          <span class="clock-icon">🕐</span>
          <div>
            <div class="clock-time" id="clock-time">--:--:--</div>
            <div class="clock-date" id="clock-date">--/--/----</div>
          </div>
        </div>
        <button class="btn-checkin" id="btn-checkin" onclick="handleCheckin()">
          Điểm danh
        </button>
      </div>
    </div>

    <div class="card" style="padding: 16px 20px;">
      <div class="calendar-heatmap">
        <div class="heatmap-header">
          <span class="heatmap-title">Lịch sử điểm danh</span>
          <div class="heatmap-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span class="month-label" id="month-label">Tháng 6 2026</span>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <div class="heatmap-grid" id="heatmap-grid"></div>

        <div class="heatmap-legend">
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot present"></span> Đúng giờ
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot late"></span> Trong giờ
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot absent"></span> Không điểm danh
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot sunday-dot"></span> Chủ nhật
          </span>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<script src="main.js"></script>
<script>
  let currentUser = null;
  let attendanceData = {};
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let clockInterval = null;
  let hasCheckedInToday = false;

  async function init() {
    currentUser = await requireLogin();
    if (!currentUser) return;

    renderSidebar("attendance", currentUser);

    startClock();
    await loadAttendanceData();
    renderCalendar();
    await checkTodayStatus();
  }

  function startClock() {
    updateClock();
    clockInterval = setInterval(updateClock, 1000);
  }

  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('vi-VN', { hour12: false });
    const dateStr = now.toLocaleDateString('vi-VN');

    document.getElementById('clock-time').textContent = timeStr;
    document.getElementById('clock-date').textContent = dateStr;
  }

  function getTodayStr() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getTimeStr() {
    const now = new Date();
    return now.toLocaleTimeString('vi-VN', { hour12: false });
  }

  function getStatusByTime() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const totalMinutes = hours * 60 + minutes;

    const WORK_START = 9 * 60;
    const WORK_END = 17 * 60;

    if (totalMinutes < WORK_START) {
      return 'present';
    } else if (totalMinutes <= WORK_END) {
      return 'late';
    } else {
      return 'absent';
    }
  }

  async function checkTodayStatus() {
    const today = getTodayStr();
    const data = attendanceData[today];
    const btn = document.getElementById('btn-checkin');

    if (data) {
      hasCheckedInToday = true;
      btn.disabled = true;
      
      const status = data.status;

      if (status === 'present') {
        btn.textContent = 'Điểm danh';
        btn.className = 'btn-checkin checked-in';
      } else if (status === 'late') {
        btn.textContent = 'Điểm danh';
        btn.className = 'btn-checkin late';
      } else if (status === 'absent') {
        btn.textContent = 'Nghỉ';
        btn.className = 'btn-checkin';
        btn.style.opacity = '0.6';
      }
    } else {
      btn.disabled = false;
      btn.textContent = 'Điểm danh';
      btn.className = 'btn-checkin';
      btn.style.opacity = '1';
    }
  }

  async function handleCheckin() {
    if (hasCheckedInToday) {
      showToast('Bạn đã điểm danh hôm nay rồi!', 'error');
      return;
    }

    const today = getTodayStr();
    const time = getTimeStr();
    const status = getStatusByTime();

    const body = {
      date: today,
      status: status,
      note: `Điểm danh lúc ${time}`
    };

    if (currentUser.role === 'admin') {
      const empSelect = document.getElementById('att-emp-id');
      if (empSelect && empSelect.value) {
        body.employee_id = parseInt(empSelect.value);
      }
    }

    const res = await API.post("/attendance", body);
    showToast(res.message, res.success ? "success" : "error");

    if (res.success) {
      attendanceData[today] = { status, time };
      hasCheckedInToday = true;
      await checkTodayStatus();
      renderCalendar();
    }
  }

  async function loadAttendanceData() {
    const month = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
    const res = await API.get(`/attendance?month=${month}`);
    
    attendanceData = {};
    if (res.success && res.data) {
      res.data.forEach(item => {
        let time = '';
        if (item.note && item.note.includes('lúc')) {
          const match = item.note.match(/lúc (\d{2}:\d{2}:\d{2})/);
          if (match) time = match[1];
        }
        attendanceData[item.date] = {
          status: item.status,
          time: time
        };
      });
    }
  }

  function renderCalendar() {
    const grid = document.getElementById('heatmap-grid');
    const monthLabel = document.getElementById('month-label');
    
    const monthNames = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
                        'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
    monthLabel.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = getTodayStr();

    const weekdays = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
    let html = '';
    weekdays.forEach(wd => {
      html += `<div class="heatmap-weekday">${wd}</div>`;
    });

    let offset = (firstDay === 0) ? 6 : firstDay - 1;

    for (let i = 0; i < offset; i++) {
      html += `<div class="heatmap-day empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const data = attendanceData[dateStr];
      const isToday = dateStr === today;
      const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
      const isSunday = dayOfWeek === 0;

      let cls = 'heatmap-day';
      let tooltipText = `${d}/${currentMonth + 1}/${currentYear}`;
      let hasData = false;
      let displayText = String(d);

      if (isSunday) {
        cls += ' sunday';
        displayText = 'Nghỉ';
        tooltipText += ' - Chủ nhật nghỉ';
      } else {
        if (data) {
          hasData = true;
          cls += ` ${data.status}`;
          const statusMap = {
            'present': 'Đúng giờ',
            'late': 'Trong giờ',
            'absent': 'Nghỉ'
          };
          tooltipText += ` - ${statusMap[data.status] || data.status}`;
          if (data.time) tooltipText += ` (${data.time})`;
        } else {
          cls += ' absent';
          tooltipText += ' - Không điểm danh';
        }
      }

      if (isToday) cls += ' today';
      if (hasData) cls += ' has-data';

      html += `
        <div class="${cls}" data-date="${dateStr}">
          ${displayText}
          ${hasData ? `<div class="tooltip">${tooltipText}</div>` : ''}
        </div>
      `;
    }

    grid.innerHTML = html;
  }

  async function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth < 0) {
      currentMonth = 11;
      currentYear--;
    } else if (currentMonth > 11) {
      currentMonth = 0;
      currentYear++;
    }

    await loadAttendanceData();
    renderCalendar();
  }

  window.addEventListener('beforeunload', () => {
    if (clockInterval) clearInterval(clockInterval);
  });

  init();
</script>
</body>
</html>
