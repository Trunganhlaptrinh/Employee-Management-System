<!DOCTYPE html>
<!-- view/incidents.html — Quản lý sự cố bảo mật -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sự cố — EmpManager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="image/logo_E.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="page-wrap">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Quản lý sự cố bảo mật</h1>
      <p>Ghi nhận và xử lý các sự cố bảo mật</p>
    </div>

    <!-- FORM THÊM SỰ CỐ -->
    <div class="card">
      <div class="card-header">
        <h2>Thêm sự cố mới</h2>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tiêu đề *</label>
          <input type="text" id="incident-title" placeholder="VD: Phishing Attack Detected" />
        </div>
        <div class="form-group">
          <label>Loại sự cố *</label>
          <select id="incident-type">
            <option value="Phishing Attack">Phishing Attack</option>
            <option value="Malware Infection">Malware Infection</option>
            <option value="Data Breach">Data Breach</option>
            <option value="Unauthorized Access">Unauthorized Access</option>
            <option value="DDoS Attack">DDoS Attack</option>
            <option value="System Outage">System Outage</option>
            <option value="Human Error">Human Error</option>
            <option value="Third-party Incident">Third-party Incident</option>
            <option value="Physical Security">Physical Security</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mức độ *</label>
          <select id="incident-severity">
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Người báo cáo</label>
          <input type="text" id="incident-reporter" placeholder="Tên người báo cáo" />
        </div>
      </div>
      <div class="form-group">
        <label>Mô tả</label>
        <textarea id="incident-desc" rows="2" placeholder="Mô tả chi tiết về sự cố"></textarea>
      </div>
      <div class="form-group">
        <label>Tài sản bị ảnh hưởng (chọn nhiều, cách nhau bằng dấu phẩy)</label>
        <input type="text" id="incident-assets" placeholder="VD: 1, 3, 5" />
      </div>
      <button class="btn btn-primary" onclick="addIncident()">Thêm sự cố</button>
    </div>

    <!-- DANH SÁCH SỰ CỐ -->
    <div class="card">
      <div class="card-header">
        <h2>Danh sách sự cố</h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="filter-severity" onchange="loadIncidents()" style="padding:6px 10px;border:1.5px solid #e4e7ec;border-radius:8px;font-family:inherit;">
            <option value="">Tất cả mức độ</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
          <select id="filter-status" onchange="loadIncidents()" style="padding:6px 10px;border:1.5px solid #e4e7ec;border-radius:8px;font-family:inherit;">
            <option value="">Tất cả trạng thái</option>
            <option value="Open">Open</option>
            <option value="Investigating">Investigating</option>
            <option value="Containing">Containing</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
          </select>
          <span id="incident-count" style="color:#6b7280;font-size:.88rem;"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Tiêu đề</th>
              <th>Loại</th>
              <th>Mức độ</th>
              <th>Trạng thái</th>
              <th>Ngày báo cáo</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="incident-body">
            <tr><td colspan="7" class="empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL SỬA SỰ CỐ -->
<div class="modal-overlay" id="edit-incident-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Sửa sự cố</h2>
      <button class="modal-close" onclick="closeModal('edit-incident-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-incident-id" />
    
    <div class="form-group">
      <label>Tiêu đề</label>
      <input type="text" id="edit-incident-title" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Loại sự cố</label>
        <select id="edit-incident-type">
          <option value="Phishing Attack">Phishing Attack</option>
          <option value="Malware Infection">Malware Infection</option>
          <option value="Data Breach">Data Breach</option>
          <option value="Unauthorized Access">Unauthorized Access</option>
          <option value="DDoS Attack">DDoS Attack</option>
          <option value="System Outage">System Outage</option>
          <option value="Human Error">Human Error</option>
          <option value="Third-party Incident">Third-party Incident</option>
          <option value="Physical Security">Physical Security</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mức độ</label>
        <select id="edit-incident-severity">
          <option value="Critical">Critical</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Trạng thái</label>
      <select id="edit-incident-status">
        <option value="Open">Open</option>
        <option value="Investigating">Investigating</option>
        <option value="Containing">Containing</option>
        <option value="Resolved">Resolved</option>
        <option value="Closed">Closed</option>
      </select>
    </div>
    <div class="form-group">
      <label>Người phụ trách</label>
      <input type="text" id="edit-incident-assignee" />
    </div>
    <div class="form-group">
      <label>Nguyên nhân gốc</label>
      <input type="text" id="edit-incident-rootcause" />
    </div>
    <div class="form-group">
      <label>Bài học kinh nghiệm</label>
      <input type="text" id="edit-incident-lessons" />
    </div>
    <div class="form-group">
      <label>Mô tả</label>
      <textarea id="edit-incident-desc" rows="2"></textarea>
    </div>
    
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModal('edit-incident-modal')">Hủy</button>
      <button class="btn btn-primary" onclick="saveEditIncident()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="main.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await requireLogin();
    if (!currentUser) return;

    if (currentUser.role !== "admin") {
      window.location.href = "dashboard.html";
      return;
    }

    renderSidebar("incidents", currentUser);
    await loadIncidents();
  }

  async function addIncident() {
    const title = document.getElementById("incident-title").value.trim();
    const incident_type = document.getElementById("incident-type").value;
    const severity = document.getElementById("incident-severity").value;
    const reported_by = document.getElementById("incident-reporter").value.trim();
    const description = document.getElementById("incident-desc").value.trim();
    const assetsInput = document.getElementById("incident-assets").value.trim();
    const affected_assets = assetsInput ? assetsInput.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [];

    if (!title) return showToast("Vui lòng nhập tiêu đề", "error");

    const res = await API.post("/incidents", {
      title, incident_type, severity, reported_by, description, affected_assets
    });

    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      document.getElementById("incident-title").value = "";
      document.getElementById("incident-reporter").value = "";
      document.getElementById("incident-desc").value = "";
      document.getElementById("incident-assets").value = "";
      await loadIncidents();
    }
  }

  async function loadIncidents() {
    const severity = document.getElementById("filter-severity").value;
    const status = document.getElementById("filter-status").value;
    let url = "/incidents";
    const params = [];
    if (severity) params.push(`severity=${severity}`);
    if (status) params.push(`status=${status}`);
    if (params.length) url += "?" + params.join("&");
    
    const res = await API.get(url);
    const tbody = document.getElementById("incident-body");

    if (!res.success) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">Không tải được danh sách</td></tr>`;
      return;
    }

    document.getElementById("incident-count").textContent = res.data.length + " sự cố";

    if (res.data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">Không tìm thấy sự cố</td></tr>`;
      return;
    }

    const severityColors = {
      Critical: 'badge-red',
      High: 'badge-yellow',
      Medium: 'badge-blue',
      Low: 'badge-gray'
    };

    const statusColors = {
      Open: 'badge-red',
      Investigating: 'badge-yellow',
      Containing: 'badge-yellow',
      Resolved: 'badge-green',
      Closed: 'badge-gray'
    };

    tbody.innerHTML = res.data.map(i => `
      <tr>
        <td style="color:#9ca3af">#${i.id}</td>
        <td style="font-weight:500;">${i.title}</td>
        <td>${i.incident_type}</td>
        <td><span class="badge ${severityColors[i.severity] || 'badge-gray'}">${i.severity}</span></td>
        <td><span class="badge ${statusColors[i.status] || 'badge-gray'}">${i.status}</span></td>
        <td>${i.reported_date || "—"}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" onclick="openEditIncident(${i.id})">Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="deleteIncident(${i.id},'${i.title}')">Xóa</button>
        </td>
      </tr>
    `).join("");
  }

  async function openEditIncident(id) {
    const res = await API.get("/incidents");
    if (!res.success) return;
    
    const incident = res.data.find(i => i.id === id);
    if (!incident) return showToast("Không tìm thấy sự cố", "error");

    document.getElementById("edit-incident-id").value = incident.id;
    document.getElementById("edit-incident-title").value = incident.title;
    document.getElementById("edit-incident-type").value = incident.incident_type;
    document.getElementById("edit-incident-severity").value = incident.severity;
    document.getElementById("edit-incident-status").value = incident.status;
    document.getElementById("edit-incident-assignee").value = incident.assigned_to || "";
    document.getElementById("edit-incident-rootcause").value = incident.root_cause || "";
    document.getElementById("edit-incident-lessons").value = incident.lessons_learned || "";
    document.getElementById("edit-incident-desc").value = incident.description || "";

    openModal("edit-incident-modal");
  }

  async function saveEditIncident() {
    const id = document.getElementById("edit-incident-id").value;
    const title = document.getElementById("edit-incident-title").value.trim();
    const incident_type = document.getElementById("edit-incident-type").value;
    const severity = document.getElementById("edit-incident-severity").value;
    const status = document.getElementById("edit-incident-status").value;
    const assigned_to = document.getElementById("edit-incident-assignee").value.trim();
    const root_cause = document.getElementById("edit-incident-rootcause").value.trim();
    const lessons_learned = document.getElementById("edit-incident-lessons").value.trim();
    const description = document.getElementById("edit-incident-desc").value.trim();

    if (!title) return showToast("Tiêu đề không được để trống", "error");

    const res = await API.put(`/incidents/${id}`, {
      title, incident_type, severity, status, assigned_to, root_cause, lessons_learned, description
    });

    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      closeModal("edit-incident-modal");
      await loadIncidents();
    }
  }

  async function deleteIncident(id, title) {
    if (!confirm(`Xóa sự cố "${title}"? Hành động này không thể hoàn tác.`)) return;
    const res = await API.delete(`/incidents/${id}`);
    showToast(res.message, res.success ? "success" : "error");
    if (res.success) await loadIncidents();
  }

  init();
</script>
</body>
</html>
