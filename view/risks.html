<!DOCTYPE html>
<!-- view/risks.html — Quản lý đánh giá rủi ro -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rủi ro — EmpManager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="image/logo_E.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="page-wrap">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Đánh giá rủi ro</h1>
      <p>Xác định và phân tích các rủi ro bảo mật</p>
    </div>

    <!-- STATS CARDS -->
    <div class="stats-row" id="risk-stats">
      <div class="stat-card">
        <div class="label">Tổng rủi ro</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Critical</div>
        <div class="value" id="stat-critical" style="color:#e53935;">0</div>
      </div>
      <div class="stat-card">
        <div class="label">High</div>
        <div class="value" id="stat-high" style="color:#f59e0b;">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Đã xử lý</div>
        <div class="value" id="stat-mitigated" style="color:#23b26d;">0</div>
      </div>
    </div>

    <!-- FORM THÊM RỦI RO -->
    <div class="card">
      <div class="card-header">
        <h2>Thêm rủi ro mới</h2>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tên rủi ro *</label>
          <input type="text" id="risk-name" placeholder="VD: Data Breach Risk" />
        </div>
        <div class="form-group">
          <label>Danh mục *</label>
          <select id="risk-category">
            <option value="Cybersecurity">Cybersecurity</option>
            <option value="Data Breach">Data Breach</option>
            <option value="System Failure">System Failure</option>
            <option value="Human Error">Human Error</option>
            <option value="Natural Disaster">Natural Disaster</option>
            <option value="Third-party Risk">Third-party Risk</option>
            <option value="Compliance">Compliance</option>
            <option value="Financial Fraud">Financial Fraud</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tài sản liên quan *</label>
          <select id="risk-asset"></select>
        </div>
        <div class="form-group">
          <label>Chủ sở hữu</label>
          <input type="text" id="risk-owner" placeholder="Tên người phụ trách" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tác động (Impact) *</label>
          <select id="risk-impact">
            <option value="Very High">Very High - 5</option>
            <option value="High">High - 4</option>
            <option value="Medium">Medium - 3</option>
            <option value="Low">Low - 2</option>
            <option value="Very Low">Very Low - 1</option>
          </select>
        </div>
        <div class="form-group">
          <label>Xác suất (Probability) *</label>
          <select id="risk-probability">
            <option value="Almost Certain">Almost Certain - 5</option>
            <option value="Likely">Likely - 4</option>
            <option value="Possible">Possible - 3</option>
            <option value="Unlikely">Unlikely - 2</option>
            <option value="Rare">Rare - 1</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Mô tả</label>
        <input type="text" id="risk-desc" placeholder="Mô tả chi tiết về rủi ro" />
      </div>
      <div class="form-group">
        <label>Biện pháp giảm thiểu</label>
        <input type="text" id="risk-mitigation" placeholder="Các biện pháp xử lý" />
      </div>
      <button class="btn btn-primary" onclick="addRisk()">Thêm rủi ro</button>
    </div>

    <!-- DANH SÁCH RỦI RO -->
    <div class="card">
      <div class="card-header">
        <h2>Danh sách rủi ro</h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="filter-status" onchange="loadRisks()" style="padding:6px 10px;border:1.5px solid #e4e7ec;border-radius:8px;font-family:inherit;">
            <option value="">Tất cả trạng thái</option>
            <option value="Identified">Identified</option>
            <option value="Analyzed">Analyzed</option>
            <option value="Mitigating">Mitigating</option>
            <option value="Mitigated">Mitigated</option>
            <option value="Accepted">Accepted</option>
            <option value="Transferred">Transferred</option>
          </select>
          <span id="risk-count" style="color:#6b7280;font-size:.88rem;"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên rủi ro</th>
              <th>Danh mục</th>
              <th>Asset</th>
              <th>Impact</th>
              <th>Probability</th>
              <th>Điểm</th>
              <th>Mức độ</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="risk-body">
            <tr><td colspan="10" class="empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL SỬA RỦI RO -->
<div class="modal-overlay" id="edit-risk-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Sửa rủi ro</h2>
      <button class="modal-close" onclick="closeModal('edit-risk-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-risk-id" />
    
    <div class="form-group">
      <label>Tên rủi ro</label>
      <input type="text" id="edit-risk-name" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Danh mục</label>
        <select id="edit-risk-category">
          <option value="Cybersecurity">Cybersecurity</option>
          <option value="Data Breach">Data Breach</option>
          <option value="System Failure">System Failure</option>
          <option value="Human Error">Human Error</option>
          <option value="Natural Disaster">Natural Disaster</option>
          <option value="Third-party Risk">Third-party Risk</option>
          <option value="Compliance">Compliance</option>
          <option value="Financial Fraud">Financial Fraud</option>
        </select>
      </div>
      <div class="form-group">
        <label>Chủ sở hữu</label>
        <input type="text" id="edit-risk-owner" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tác động (Impact)</label>
        <select id="edit-risk-impact">
          <option value="Very High">Very High</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
          <option value="Very Low">Very Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Xác suất (Probability)</label>
        <select id="edit-risk-probability">
          <option value="Almost Certain">Almost Certain</option>
          <option value="Likely">Likely</option>
          <option value="Possible">Possible</option>
          <option value="Unlikely">Unlikely</option>
          <option value="Rare">Rare</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Trạng thái</label>
      <select id="edit-risk-status">
        <option value="Identified">Identified</option>
        <option value="Analyzed">Analyzed</option>
        <option value="Mitigating">Mitigating</option>
        <option value="Mitigated">Mitigated</option>
        <option value="Accepted">Accepted</option>
        <option value="Transferred">Transferred</option>
      </select>
    </div>
    <div class="form-group">
      <label>Mô tả</label>
      <input type="text" id="edit-risk-desc" />
    </div>
    <div class="form-group">
      <label>Biện pháp giảm thiểu</label>
      <input type="text" id="edit-risk-mitigation" />
    </div>
    
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-ghost" onclick="closeModal('edit-risk-modal')">Hủy</button>
      <button class="btn btn-primary" onclick="saveEditRisk()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="main.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await requireLogin();
    if (!currentUser) return;

    if (currentUser.role !== "admin") {
      window.location.href = "dashboard.html";
      return;
    }

    renderSidebar("risks", currentUser);
    await loadAssetsOptions();
    await loadRisks();
    await loadRiskStats();
  }

  async function loadAssetsOptions() {
    const res = await API.get("/assets");
    if (!res.success) return;
    const sel = document.getElementById("risk-asset");
    sel.innerHTML = res.data.map(a => 
      `<option value="${a.id}">${a.name} (${a.asset_type})</option>`
    ).join("");
  }

  async function addRisk() {
    const name = document.getElementById("risk-name").value.trim();
    const category = document.getElementById("risk-category").value;
    const asset_id = parseInt(document.getElementById("risk-asset").value);
    const impact = document.getElementById("risk-impact").value;
    const probability = document.getElementById("risk-probability").value;
    const owner = document.getElementById("risk-owner").value.trim();
    const description = document.getElementById("risk-desc").value.trim();
    const mitigation = document.getElementById("risk-mitigation").value.trim();

    if (!name) return showToast("Vui lòng nhập tên rủi ro", "error");

    const res = await API.post("/risks", {
      name, category, asset_id, impact, probability, owner, description, mitigation
    });

    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      document.getElementById("risk-name").value = "";
      document.getElementById("risk-owner").value = "";
      document.getElementById("risk-desc").value = "";
      document.getElementById("risk-mitigation").value = "";
      await loadRisks();
      await loadRiskStats();
    }
  }

  async function loadRisks() {
    const status = document.getElementById("filter-status").value;
    const url = status ? `/risks?status=${status}` : "/risks";
    const res = await API.get(url);
    const tbody = document.getElementById("risk-body");

    if (!res.success) {
      tbody.innerHTML = `<tr><td colspan="10" class="empty">Không tải được danh sách</td></tr>`;
      return;
    }

    document.getElementById("risk-count").textContent = res.data.length + " rủi ro";

    if (res.data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" class="empty">Không tìm thấy rủi ro</td></tr>`;
      return;
    }

    const levelColors = {
      Critical: 'badge-red',
      High: 'badge-yellow',
      Medium: 'badge-blue',
      Low: 'badge-gray'
    };

    tbody.innerHTML = res.data.map(r => `
      <tr>
        <td style="color:#9ca3af">#${r.id}</td>
        <td style="font-weight:500;">${r.name}</td>
        <td>${r.category}</td>
        <td>Asset #${r.asset_id}</td>
        <td>${r.impact}</td>
        <td>${r.probability}</td>
        <td style="font-weight:600;">${r.risk_score}</td>
        <td><span class="badge ${levelColors[r.risk_level] || 'badge-gray'}">${r.risk_level}</span></td>
        <td><span class="badge badge-gray">${r.status}</span></td>
        <td style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" onclick="openEditRisk(${r.id})">Sửa</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRisk(${r.id},'${r.name}')">Xóa</button>
        </td>
      </tr>
    `).join("");
  }

  async function openEditRisk(id) {
    const res = await API.get("/risks");
    if (!res.success) return;
    
    const risk = res.data.find(r => r.id === id);
    if (!risk) return showToast("Không tìm thấy rủi ro", "error");

    document.getElementById("edit-risk-id").value = risk.id;
    document.getElementById("edit-risk-name").value = risk.name;
    document.getElementById("edit-risk-category").value = risk.category;
    document.getElementById("edit-risk-owner").value = risk.owner || "";
    document.getElementById("edit-risk-impact").value = risk.impact;
    document.getElementById("edit-risk-probability").value = risk.probability;
    document.getElementById("edit-risk-status").value = risk.status;
    document.getElementById("edit-risk-desc").value = risk.description || "";
    document.getElementById("edit-risk-mitigation").value = risk.mitigation || "";

    openModal("edit-risk-modal");
  }

  async function saveEditRisk() {
    const id = document.getElementById("edit-risk-id").value;
    const name = document.getElementById("edit-risk-name").value.trim();
    const category = document.getElementById("edit-risk-category").value;
    const impact = document.getElementById("edit-risk-impact").value;
    const probability = document.getElementById("edit-risk-probability").value;
    const status = document.getElementById("edit-risk-status").value;
    const owner = document.getElementById("edit-risk-owner").value.trim();
    const description = document.getElementById("edit-risk-desc").value.trim();
    const mitigation = document.getElementById("edit-risk-mitigation").value.trim();

    if (!name) return showToast("Tên rủi ro không được để trống", "error");

    const res = await API.put(`/risks/${id}`, {
      name, category, impact, probability, status, owner, description, mitigation
    });

    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      closeModal("edit-risk-modal");
      await loadRisks();
      await loadRiskStats();
    }
  }

  async function deleteRisk(id, name) {
    if (!confirm(`Xóa rủi ro "${name}"? Hành động này không thể hoàn tác.`)) return;
    const res = await API.delete(`/risks/${id}`);
    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      await loadRisks();
      await loadRiskStats();
    }
  }

  async function loadRiskStats() {
    const res = await API.get("/risks/stats");
    if (!res.success) return;
    
    const stats = res.data;
    document.getElementById("stat-total").textContent = stats.total || 0;
    document.getElementById("stat-critical").textContent = stats.by_level?.Critical || 0;
    document.getElementById("stat-high").textContent = stats.by_level?.High || 0;
    document.getElementById("stat-mitigated").textContent = stats.by_status?.Mitigated || 0;
  }

  init();
</script>
</body>
</html>
